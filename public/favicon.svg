<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0f172a" />

  <!-- Shield -->
  <path
    d="M16 3L27 7.5V17.5Q27 25 16 29Q5 25 5 17.5V7.5Z"
    stroke="#00d4ff"
    stroke-width="1.5"
    fill="none"
    stroke-linejoin="round"
  />

  <!-- Eye outline -->
  <path
    d="M8 16Q16 10 24 16Q16 22 8 16Z"
    stroke="#00d4ff"
    stroke-width="1.1"
    fill="none"
  />

  <!-- Iris glow -->
  <circle cx="16" cy="16" r="3" fill="#00d4ff" opacity="0.18" />

  <!-- Iris ring -->
  <circle cx="16" cy="16" r="2.2" stroke="#00d4ff" stroke-width="1" fill="none" />

  <!-- Pupil -->
  <circle cx="16" cy="16" r="0.9" fill="#00d4ff" />

  <!-- Circuit traces left -->
  <line x1="5" y1="16" x2="7.5" y2="16" stroke="#00d4ff" stroke-width="0.8" />
  <circle cx="4.5" cy="16" r="0.7" fill="#00d4ff" />

  <!-- Circuit traces right -->
  <line x1="24.5" y1="16" x2="27" y2="16" stroke="#00d4ff" stroke-width="0.8" />
  <circle cx="27.5" cy="16" r="0.7" fill="#00d4ff" />
</svg>